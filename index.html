<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthnoBotany AI Platform</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 15px; }
        .card { background: #121212; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; background: #222; border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-green { background: #4CAF50; color: white; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-dark { background: #222; color: #fff; border: 1px solid #444; }
        .comment-item { background: #1a1a1a; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; border-left: 3px solid #4CAF50; }
        .comment-user { font-weight: bold; color: #4CAF50; font-size: 13px; }
        .comment-text { font-size: 14px; margin-top: 2px; }
        .profile-posts-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; }
        .profile-thumb { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; background: #1c1c1c; padding: 8px; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="auth-panel" class="card">
        <h3 style="margin-top:0; color:#4CAF50;">🔐 Member Profile Panel</h3>
        <p id="welcome-message" style="color:#aaa; font-size:14px;">Create a unique profile username below if you want to publish scanned findings or leave comments on other posts.</p>
        
        <div id="auth-form-inputs">
            <input type="email" id="user-email" placeholder="Email Address">
            <input type="text" id="user-username" placeholder="Choose Unique Username">
            <input type="password" id="user-password" placeholder="Password">
            <button class="btn-green" onclick="handleAuth()">Register Account & Login</button>
        </div>

        <div id="my-profile-tab" style="display: none;" class="profile-posts-box">
            <h4 style="color: #2196F3; margin: 0 0 10px 0;">📂 My Scanned History</h4>
            <div id="my-personal-posts-target" style="color: #888; font-size: 13px;">You haven't posted any scanned plant findings yet.</div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0;">🌿 EthnoBotany AI Scanner</h3>
        <input type="file" id="file-chooser" accept="image/*" style="display:none;" onchange="imageSelected(this)">
        <input type="file" id="camera-chooser" accept="image/*" capture="environment" style="display:none;" onchange="imageSelected(this)">
        
        <button class="btn-green" onclick="document.getElementById('camera-chooser').click()">📸 Take Live Photo</button>
        <button class="btn-dark" onclick="document.getElementById('file-chooser').click()">📁 Upload from Files</button>
        
        <p id="selected-file-status" style="font-size:12px; color:#888; text-align:center; margin-top:8px; display:none;"></p>
    </div>

    <div id="analysis-output-card" class="card" style="display:none;">
        <h2 style="color:#4CAF50; margin-top:0; font-size:22px;">Plant Analysis Discovery</h2>
        
        <div style="text-align:center; margin:15px 0;">
            <img id="scanned-image-render" src="" style="max-width:100%; max-height:250px; border-radius:8px; border:1px solid #333;" alt="Scanned Plant">
        </div>
        
        <h3 style="color:#aaa; font-size:15px; text-transform:uppercase; margin-bottom:5px;">Description</h3>
        <p id="clean-description-content" style="line-height:1.6; font-size:15px; margin-bottom:20px; text-align:justify; color:#e0e0e0;"></p>
        
        <div style="border-top:1px solid #222; padding-top:15px; margin-bottom:15px;">
            <button class="btn-blue" onclick="publishScannedResult()">📤 Post Analysis to Community Board</button>
        </div>
    </div>

    <h3 style="color:#4CAF50; padding-left:5px;">🌐 Community Board Feed</h3>
    <div id="global-board-target"></div>

    <script>
        let currentActiveBase64 = "";
        let selectedFilePayload = null;

        // Auto-fetch feed on page load
        window.addEventListener('DOMContentLoaded', () => {
            fetchGlobalFeed();
            if (localStorage.getItem('username')) {
                showLoggedInUI();
            }
        });

        async function fetchGlobalFeed() {
            try {
                const res = await fetch('/api/feed');
                const data = await res.json();
                if (data.feed) {
                    renderFeed(data.feed);
                }
            } catch (err) {
                console.error("Error loading feed:", err);
            }
        }

        async function handleAuth() {
            const email = document.getElementById('user-email').value;
            const username = document.getElementById('user-username').value.trim();
            const password = document.getElementById('user-password').value;

            if(!email || !username || !password) return alert("Please fill out all fields!");

            const res = await fetch('/api/register', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, username, password })
            });
            const data = await res.json();
            
            if(data.error) {
                alert(data.error);
            } else {
                localStorage.setItem('username', data.username);
                showLoggedInUI();
                fetchGlobalFeed(); // Refresh view
            }
        }

        function showLoggedInUI() {
            document.getElementById('auth-form-inputs').style.display = 'none';
            document.getElementById('welcome-message').innerHTML = `Logged in securely as: <strong style="color:#4CAF50;">@${localStorage.getItem('username')}</strong>`;
            document.getElementById('my-profile-tab').style.display = 'block';
        }

        function imageSelected(inputNode) {
            if (inputNode.files.length === 0) return;
            selectedFilePayload = inputNode.files[0];
            document.getElementById('selected-file-status').innerText = `Selected: ${selectedFilePayload.name} (Processing...)`;
            document.getElementById('selected-file-status').style.display = 'block';
            
            executeUploadProcessing();
        }

        async function executeUploadProcessing() {
            const reader = new FileReader();
            reader.onloadend = async function () {
                currentActiveBase64 = reader.result;
                
                const formData = new FormData();
                formData.append('image', selectedFilePayload);

                const res = await fetch('/api/scan', { method: "POST", body: formData });
                const data = await res.json();

                document.getElementById('selected-file-status').style.display = 'none';

                if (data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('scanned-image-render').src = currentActiveBase64;
                    document.getElementById('clean-description-content').innerText = data.result;
                    document.getElementById('analysis-output-card').style.display = 'block';
                }
            };
            reader.readAsDataURL(selectedFilePayload);
        }

        async function publishScannedResult() {
            const description = document.getElementById('clean-description-content').innerText;
            const currentUser = localStorage.getItem('username');

            if(!currentUser) return alert("Login Action Required: Please register/login using the profile card at the top to share to the board!");

            const res = await fetch('/api/feed/post', {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "x-user-auth": currentUser
                },
                body: JSON.stringify({ imageData: currentActiveBase64, description: description })
            });
            const data = await res.json();
            if(data.error) {
                alert(data.error);
            } else if(data.success) {
                renderFeed(data.feed);
                document.getElementById('analysis-output-card').style.display = 'none';
            }
        }

        async function postComment(postId) {
            const commentInput = document.getElementById(`comment-in-${postId}`);
            const currentUser = localStorage.getItem('username');
            if(!commentInput.value.trim()) return;

            if(!currentUser) return alert("Login Action Required: Please register/login using the profile card at the top to comment!");

            const res = await fetch('/api/feed/comment', {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-user-auth": currentUser
                },
                body: JSON.stringify({ postId: postId, text: commentInput.value })
            });
            const data = await res.json();
            if(data.error) {
                alert(data.error);
            } else if(data.success) {
                renderFeed(data.feed);
            }
        }

        function renderFeed(feedItems) {
            const globalTarget = document.getElementById('global-board-target');
            const personalTarget = document.getElementById('my-personal-posts-target');
            const currentUser = localStorage.getItem('username');

            globalTarget.innerHTML = feedItems.length === 0 ? '<p style="color:#555; padding-left:5px;">No public specimen shares logged yet. Be the first to post!</p>' : '';
            
            let personalPostsHtml = "";

            feedItems.forEach(item => {
                let commentsHtml = item.comments.map(c => `
                    <div class="comment-item">
                        <div class="comment-user">@${c.username}</div>
                        <div class="comment-text">${c.text}</div>
                    </div>
                `).join('');

                // Check if this post belongs to the logged-in user to show in profile history
                if (currentUser && item.username.toLowerCase() === currentUser.toLowerCase()) {
                    personalPostsHtml += `
                        <div class="profile-thumb">
                            <img src="${item.image}" style="width:50px; height:50px; object-fit:cover; border-radius:4px;">
                            <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px;">
                                <strong>Scanned Specimen</strong><br>
                                <span style="font-size:11px; color:#aaa;">${item.description.substring(0, 40)}...</span>
                            </div>
                        </div>
                    `;
                }

                globalTarget.innerHTML += `
                    <div class="card">
                        <div style="font-weight:bold; margin-bottom:10px; color:#aaa;">Shared by: @${item.username}</div>
                        <img src="${item.image}" style="max-width:100%; border-radius:6px; margin-bottom:10px;">
                        <p style="font-size:14px; line-height:1.5; color:#ddd;">${item.description}</p>
                        
                        <div style="margin-top:15px; padding-top:10px; border-top:1px solid #222;">
                            <h5 style="margin:0 0 8px 0; color:#888;">Comments (${item.comments.length})</h5>
                            <div>${commentsHtml}</div>
                            <div style="display:flex; gap:8px; margin-top:8px;">
                                <input type="text" id="comment-in-${item.id}" placeholder="Write a comment..." style="margin:0; padding:8px;">
                                <button class="btn-green" onclick="postComment(${item.id})" style="width:auto; margin:0; padding:0 15px;">Send</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Populate the history tab if you have items inside
            if (currentUser && personalPostsHtml !== "") {
                personalTarget.innerHTML = personalPostsHtml;
            } else if (currentUser) {
                personalTarget.innerHTML = "You haven't posted any scanned plant findings yet.";
            }
        }
    </script>
</body>
</html>
